<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meridian - Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0f0f;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(420px, 92vw);
        border: 1px solid #2a2a2a;
        background: #1a1a1a;
        border-radius: 16px;
        padding: 20px;
      }
      h1 { margin: 0 0 8px; font-size: 1.2rem; }
      p { margin: 0; color: #c4c4c5; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Sin conexion</h1>
      <p>Meridian esta funcionando en modo offline. Revisa tu red e intenta nuevamente.</p>
    </section>
  </body>
</html>
